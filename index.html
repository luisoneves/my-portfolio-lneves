<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no, viewport-fit=cover">

  <!-- Preload Critical Resources -->
  <link rel="preload"
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
    as="style">
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">

  <!-- CSS -->
  <link rel="stylesheet" href="./src/styles/main.css">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet">

  <!-- Primary SEO -->
  <title>Luis Neves | Software Engineer</title>
  <meta name="description"
    content="Software engineer building modular systems, SaaS platforms, and experimental products. Focused on architecture, clean code, and product engineering.">
  <meta name="robots" content="index, follow">
  <meta name="author" content="Luis Neves">

  <!-- Canonical -->
  <link rel="canonical" href="https://www.luisneves.dev/">

  <!-- Theme -->
  <meta name="theme-color" content="#d76f30">
  <meta name="color-scheme" content="light dark">

  <!-- Favicons -->
  <link rel="icon" href="./images/favicon/favicon.png" type="image/png+xml">
  <link rel="icon" href="./images/favicon/favicon.png" type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" href="./images/favicon/favicon.png" sizes="180x180">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Luis Neves">
  <meta property="og:title" content="Luis Neves | Software Engineer">
  <meta property="og:description"
    content="Software engineer building modular systems, SaaS platforms, and experimental products.">
  <meta property="og:url" content="https://www.luisneves.dev/">
  <meta property="og:locale" content="en">
  <meta property="og:image" content="https://www.luisneves.dev/images/og-image.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Luis Neves, software engineer">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Luis Neves | Software Engineer">
  <meta name="twitter:description" content="Building modular systems, SaaS platforms, and experimental products.">
  <meta name="twitter:image" content="https://www.luisneves.dev/images/og-image.png">
  <meta name="twitter:creator" content="@luisneves">

  <!-- Scripts (vanilla, no modules) -->
  <script src="./src/data/data.js" defer></script>
  <script src="./src/scripts/components.js" defer></script>
  <script src="./src/scripts/main.js" defer></script>
</head>

<body>
  <a class="skip-link" href="#main-content">Skip to content</a>

  <!-- HEADER -->
  <header class="site-header" role="banner">
    <div class="container header-inner">
      <a class="logo" href="#home" aria-label="Back to top">
        <img id="logo-navbar" src="./images/logo-LN_ligthmode.png" alt="LN" width="50" height="50">
      </a>

      <div class="nav-controls">
        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="menu"
          aria-label="Open menu">
          Menu
        </button>

        <nav class="site-nav" id="menu" aria-label="Main navigation">
          <!-- Rendered by components.js -->
        </nav>

        <!-- Dark Mode Toggle -->
        <button id="dark-mode-toggle" class="dark-mode-btn" aria-label="Toggle theme">
          <span aria-hidden="true">◑</span>
        </button>
      </div>
    </div>
  </header>

  <main id="main-content" role="main">
    <!-- SECTION: Hero / Home -->
    <section class="hero" id="home" aria-label="Introduction">
      <div class="container hero__grid" id="hero-content">
        <!-- Rendered by components.js -->
      </div>
    </section>

    <!-- SECTION: Projects -->
    <section class="section" id="projects" aria-labelledby="projects-title">
      <div class="container">
        <div class="section__header">
          <p class="eyebrow">Projects</p>
          <h2 id="projects-title">Problem → Solution</h2>
        </div>
        <div class="cards" id="projects-content">
          <!-- Rendered by components.js -->
        </div>
      </div>
    </section>

    <!-- SECTION: Technologies -->
    <section class="section" id="technologies" aria-labelledby="technologies-title">
      <div class="container">
        <div class="section__header">
          <p class="eyebrow">Stack</p>
          <h2 id="technologies-title">Technologies I Work With</h2>
        </div>
        <div class="tech-grid" id="technologies-content">
          <!-- Rendered by components.js -->
        </div>
      </div>
    </section>

    <!-- SECTION: Engineering Notes -->
    <section class="section" id="notes" aria-labelledby="notes-title">
      <div class="container">
        <div class="section__header">
          <p class="eyebrow">Engineering Notes</p>
          <h2 id="notes-title">Thinking in public</h2>
        </div>
        <div class="notes-grid" id="notes-content">
          <!-- Rendered by components.js -->
        </div>
      </div>
    </section>

    <!-- SECTION: Reading -->
    <section class="section" id="reading" aria-labelledby="reading-title">
      <div class="container">
        <div class="section__header">
          <p class="eyebrow">Learning</p>
          <h2 id="reading-title">Books & Courses</h2>
        </div>
        <div id="reading-content">
          <!-- Rendered by components.js -->
        </div>
      </div>
    </section>

    <!-- SECTION: About -->
    <section class="section" id="about" aria-labelledby="about-title">
      <div class="container two-col">
        <div class="section__header" style="grid-column: 1 / -1;">
          <p class="eyebrow">About</p>
          <h2 id="about-title">My Journey</h2>
        </div>
        <div id="about-content" style="display: contents;">
          <!-- Rendered by components.js -->
        </div>
      </div>
    </section>

    <!-- SECTION: Contact -->
    <section class="section" id="contact" aria-labelledby="contact-title">
      <div class="container cta__inner" id="contact-content">
        <!-- Rendered by components.js -->
      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer" role="contentinfo">
    <div class="container footer__inner" id="footer-content">
      <!-- Rendered by components.js -->
    </div>
  </footer>
</body>

</html>
